<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acme Cloud — Dashboard</title>
<style>
  :root {
    --color-primary: #2F6FED;
    --color-primary-hover: #2558C9;
    --color-text: #1A202C;
    --color-text-secondary: #64748B;
    --color-border: #E2E8F0;
    --color-bg: #F7F9FC;
    --color-surface: #FFFFFF;
    --color-danger: #E53E3E;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --radius-sm: 4px;
    --radius-md: 6px;
    --font-base: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: var(--font-base);
    color: var(--color-text);
    background: var(--color-bg);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    padding: 0 var(--space-lg);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }

  header .logo {
    font-weight: 700;
    color: var(--color-primary);
  }

  header nav a {
    margin-left: var(--space-lg);
    color: var(--color-text-secondary);
    text-decoration: none;
  }

  .layout {
    display: flex;
  }

  .sidebar {
    width: 200px;
    padding: var(--space-lg) var(--space-md);
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    min-height: calc(100vh - 56px);
  }

  .sidebar a {
    display: block;
    padding: var(--space-sm) var(--space-md);
    margin-bottom: var(--space-xs);
    border-radius: var(--radius-sm);
    color: var(--color-text-secondary);
    text-decoration: none;
  }

  .sidebar a.active {
    background: var(--color-bg);
    color: var(--color-primary);
    font-weight: 600;
  }

  main {
    flex: 1;
    padding: var(--space-lg);
    max-width: 1200px;
  }

  main h1 {
    font-size: 20px;
    margin-bottom: var(--space-lg);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
  }

  .card .label {
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
  }

  .card .value {
    font-size: 24px;
    font-weight: 700;
  }

  .panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-md);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    text-align: left;
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--color-border);
  }

  th {
    color: var(--color-text-secondary);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
  }

  .btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    font-weight: 600;
    text-decoration: none;
    border: 1px solid transparent;
  }

  .btn-primary {
    background: var(--color-primary);
    color: #FFFFFF;
  }

  .btn-primary:hover {
    background: var(--color-primary-hover);
  }
</style>
</head>
<body>
  <header>
    <div class="logo">Acme Cloud</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="#">Projects</a>
      <a href="settings.html">Settings</a>
    </nav>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="active">Overview</a>
      <a href="#">Usage</a>
      <a href="#">Billing</a>
      <a href="settings.html">Settings</a>
    </aside>
    <main>
      <h1>Overview</h1>
      <div class="card-grid">
        <div class="card">
          <div class="label">Active projects</div>
          <div class="value">24</div>
        </div>
        <div class="card">
          <div class="label">Storage used</div>
          <div class="value">1.4 TB</div>
        </div>
        <div class="card">
          <div class="label">Monthly spend</div>
          <div class="value">$842</div>
        </div>
      </div>
      <div class="panel">
        <table>
          <thead>
            <tr><th>Project</th><th>Owner</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            <tr>
              <td>Payments API</td>
              <td>D. Chen</td>
              <td>Active</td>
              <td><a class="btn btn-primary" href="#">Open</a></td>
            </tr>
            <tr>
              <td>Reporting Service</td>
              <td>S. Okafor</td>
              <td>Active</td>
              <td><a class="btn btn-primary" href="#">Open</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
