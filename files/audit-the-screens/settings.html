<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Acme Cloud — Settings</title>
<style>
  :root {
    --color-primary: #2F6EED;
    --color-primary-hover: #2558C9;
    --color-text: #1A202C;
    --color-text-secondary: #64748C;
    --color-border: #E1E8F0;
    --color-bg: #F7F9FC;
    --color-surface: #FFFFFF;
    --color-danger: #E53E3E;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 15px;
    --space-lg: 24px;
    --radius-sm: 4px;
    --radius-md: 7px;
    --font-base: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: var(--font-base);
    color: var(--color-text);
    background: var(--color-bg);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    padding: 0 var(--space-lg);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }

  header .logo {
    font-weight: 700;
    color: var(--color-primary);
  }

  header nav a {
    margin-left: var(--space-lg);
    color: var(--color-text-secondary);
    text-decoration: none;
  }

  .layout {
    display: flex;
  }

  .sidebar {
    width: 200px;
    padding: var(--space-lg) var(--space-md);
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    min-height: calc(100vh - 56px);
  }

  .sidebar a {
    display: block;
    padding: var(--space-sm) var(--space-md);
    margin-bottom: var(--space-xs);
    border-radius: var(--radius-sm);
    color: var(--color-text-secondary);
    text-decoration: none;
  }

  .sidebar a.active {
    background: var(--color-bg);
    color: var(--color-primary);
    font-weight: 600;
  }

  main {
    flex: 1;
    padding: var(--space-lg);
    max-width: 720px;
  }

  main h1 {
    font-size: 20px;
    margin-bottom: var(--space-lg);
  }

  .panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.09);
  }

  .panel h2 {
    font-size: 16px;
    margin-bottom: var(--space-md);
  }

  .field {
    margin-bottom: var(--space-md);
  }

  .field label {
    display: block;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
  }

  .field input {
    width: 100%;
    padding: var(--space-sm) var(--space-md);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-size: var(--font-base);
  }

  .btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    font-weight: 600;
    text-decoration: none;
    border: 1px solid transparent;
  }

  .btn-primary {
    background: var(--color-primary);
    color: #FFFFFF;
  }

  .btn-primary:hover {
    background: var(--color-primary-hover);
  }

  .btn-danger {
    background: var(--color-danger);
    color: #FFFFFF;
  }

  .danger-zone {
    border-color: var(--color-danger);
  }

  .danger-zone p {
    color: var(--color-text-secondary);
    margin-bottom: var(--space-md);
  }
</style>
</head>
<body>
  <header>
    <div class="logo">Acme Cloud</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="#">Projects</a>
      <a href="settings.html">Settings</a>
    </nav>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <a href="dashboard.html">Overview</a>
      <a href="#">Usage</a>
      <a href="#">Billing</a>
      <a href="settings.html" class="active">Settings</a>
    </aside>
    <main>
      <h1>Account settings</h1>
      <div class="panel">
        <h2>Profile</h2>
        <div class="field">
          <label>Display name</label>
          <input type="text" value="D. Chen">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="text" value="d.chen@acme.example">
        </div>
        <a class="btn btn-primary" href="#">Save changes</a>
      </div>
      <div class="panel danger-zone">
        <h2>Danger zone</h2>
        <p>Deleting your account removes all projects and billing history. This cannot be undone.</p>
        <a class="btn btn-danger" href="#">Delete account</a>
      </div>
    </main>
  </div>
</body>
</html>
